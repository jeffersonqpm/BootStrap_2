<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/jeff.css">
    <link rel="stylesheet" href="jeff.css">
    <title>SGP - Dashboard</title>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container-fluid">
            
            <!-- Logo -->
            <div class="login-box logo_2">
                <a href="#"><img src="img/logo_2.png" alt="Logo"></a>
            </div>

            <!-- Toggler (Hambúrguer) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Elementos que entram no colapso -->
            <div class="collapse navbar-collapse ajusteBotaoMenu" id="navbarNav">
                
                <!-- Botões de Navegação -->
                <div class=" me-auto ms-lg-3">
                    <button type="button" class="btn btn-primary botaoMenu" onclick="window.location.href='index.html'">
                        <i class="bi bi-grid-1x2-fill me-2"></i> Dashboard
                    </button>

                    <button type="button" class="btn btn-light botaoMenu" onclick="window.location.href='tarefa.html'">
                        <i class="bi bi-card-checklist me-1"></i> Tarefas
                    </button>

                    <button type="button" class="btn btn-light botaoMenu" onclick="window.location.href='projeto.html'">

                    </button>

                    <button type="button" class="btn btn-light botaoMenu" onclick="window.location.href='usuario.html'">
                        <i class="bi bi-person me-1"></i> Usuários
                    </button>
                </div>

                <!-- Perfil do Usuário -->
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-person jeff"></i> Olá, Jefferson
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#">Perfil</a></li>
                            <li><a class="dropdown-item" href="#">Configurações</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#">Sair</a></li>
                        </ul>
                    </li>
                </ul>
            </div> <!-- Fim do navbar-collapse -->

        </div>
    </nav>

    <header class="py-4">
        <div class="container">
            <h1>Dashboard</h1>
        </div>
    </header>

    <!-- Bootstrap Bundle JS (Necessário para o dropdown e o hambúrguer funcionarem) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
